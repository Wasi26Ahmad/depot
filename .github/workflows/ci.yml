# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.5
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop --fail-level E


    #Ready kora thaklo apatoto error chara kichui dibe na tai disbled
    #  - name: Run Brakeman
    #    run: bundle exec brakeman --no-pager

      - name: Setup DB
        run: |
          bin/rails db:create
          bin/rails db:schema:load